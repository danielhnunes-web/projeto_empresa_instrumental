<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmoniq</title>

    <link rel="stylesheet" href="../css/style_carrinho.css">

    <script src="../js/carrinho.js" defer></script>
</head>
<body>

    <div id="geral">
        <header id="cabecalho">
            <div id="logo">
                Harmoniq
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="cadastro.html">cadastro</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href=""></a></li>
                    <li><a href="carrinho.html" class="icone-carrinho">
                            <img src="../image/icones/16316627108573499327.png" alt="Carrinho">
                            <span id="contador" class="contador">0</span>
                        </a>
                    </li>
                </ul>
            </nav>

        </header>

        <section class="carrinho">
            <h2>Carrinho de Compras</h2>
        
            <ul id="lista-carrinho">
                
            </ul>
        
            <div class="total">
                <h3>Total dos produtos: R$ <span id="total">0,00</span></h3>
            </div>
        
            <div class="frete">
                <h3>Calcular Frete</h3>
        
                <input type="text" id="cep" placeholder="Digite seu CEP" maxlength="8">
        
                <button onclick="calcularFrete()">Calcular</button>
        
                <p id="resultado-frete"></p>
            </div>
        
            <div class="total-final">
                <h3>Total com frete: R$ <span id="total-final">0,00</span></h3>
            </div>

            <div class="botoes-carrinho">
                <a href="../index.html" class="btn-continuar">Continuar Compra</a>
                <button onclick="finalizarCompra()" class="btn-finalizar">Finalizar Compra</button>
            </div>
        
        </section>

        <footer id="rodape">
            <h2>Harmoniq</h2>
            <p>© 2026 - Todos os direitos reservados.</p>

        </footer>
    </div>
</body>
</html>
